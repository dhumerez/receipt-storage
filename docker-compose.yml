services:
  receipts-api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://receipts_user:${DB_PASSWORD}@receipts-db:5432/receipts
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /var/receipts/uploads
      PORT: "4000"
      CORS_ORIGIN: ${CORS_ORIGIN}
    volumes:
      - /var/receipts/uploads:/var/receipts/uploads
    depends_on:
      receipts-db:
        condition: service_healthy
    networks:
      - receipts_internal

  receipts-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    networks:
      - receipts_internal

  receipts-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: receipts
      POSTGRES_USER: receipts_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - receipts_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receipts_user -d receipts"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - receipts_internal

volumes:
  receipts_db_data:

networks:
  receipts_internal:
    driver: bridge
