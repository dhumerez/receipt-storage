<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rastreador de Recibos</title>
    <meta name="description" content="Gestiona y rastrea tus recibos y deudas" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <div id="root"><p style="padding:2rem;font-family:sans-serif;color:#333">Cargando aplicaci&oacute;n&hellip;</p></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Collect all errors for diagnostics
      var _diag = { errors: [], resources: [] };

      // Capture-phase listener: catches resource loading failures (script 404, CORS)
      window.addEventListener('error', function(e) {
        if (e.target && e.target.tagName) {
          _diag.resources.push(e.target.tagName + ': ' + (e.target.src || e.target.href || '?'));
        }
      }, true);

      // Bubble-phase: JS runtime errors
      window.addEventListener('error', function(e) {
        _diag.errors.push('JS: ' + e.message + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'));
        showDiag();
      });

      // Unhandled promise rejections
      window.addEventListener('unhandledrejection', function(e) {
        _diag.errors.push('Promise: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
        showDiag();
      });

      function showDiag() {
        var root = document.getElementById('root');
        if (!root) return;
        var lines = [
          'UA: ' + navigator.userAgent,
          'URL: ' + location.href,
          'Proto: ' + location.protocol,
          ''
        ];
        if (_diag.errors.length) lines.push('ERRORS:', _diag.errors.join('\n'), '');
        if (_diag.resources.length) lines.push('FAILED RESOURCES:', _diag.resources.join('\n'), '');
        root.innerHTML =
          '<pre style="padding:1rem;color:red;font-size:11px;white-space:pre-wrap;word-break:break-all">' +
          lines.join('\n') + '</pre>';
      }

      // Timeout: if React hasn't mounted after 8s, show diagnostics
      setTimeout(function() {
        var root = document.getElementById('root');
        if (!root) return;
        // React replaces inner content on mount — check if placeholder still there
        if (root.querySelector('p') || root.innerHTML.indexOf('Cargando') > -1) {
          _diag.errors.push('TIMEOUT: React did not mount within 8 seconds');
          // Check which scripts loaded
          var scripts = document.querySelectorAll('script[src]');
          for (var i = 0; i < scripts.length; i++) {
            _diag.resources.push('script: ' + scripts[i].src + ' (in DOM)');
          }
          // Check if module script exists and its state
          var moduleScript = document.querySelector('script[type="module"]');
          if (moduleScript) {
            _diag.resources.push('module src: ' + (moduleScript.src || 'inline'));
          }
          showDiag();
        }
      }, 8000);

      // Service worker: derive base path dynamically
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          var base = document.querySelector('script[type="module"][src]');
          var basePath = '/';
          if (base && base.src) {
            var url = new URL(base.src);
            var idx = url.pathname.indexOf('/assets/');
            if (idx > 0) basePath = url.pathname.substring(0, idx + 1);
          }
          navigator.serviceWorker.register(basePath + 'sw.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
