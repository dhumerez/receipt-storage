<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rastreador de Recibos</title>
    <meta name="description" content="Gestiona y rastrea tus recibos y deudas" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <div id="root"><p data-placeholder style="padding:2rem;font-family:sans-serif;color:#333">Cargando aplicaci&oacute;n&hellip;</p></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA installability (requires HTTPS)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          // Derive SW path from the module script's base (works with Vite base path)
          var mod = document.querySelector('script[type="module"][src]');
          var base = '/';
          if (mod && mod.src) {
            var idx = new URL(mod.src).pathname.indexOf('/assets/');
            if (idx > 0) base = new URL(mod.src).pathname.substring(0, idx + 1);
          }
          navigator.serviceWorker.register(base + 'sw.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
