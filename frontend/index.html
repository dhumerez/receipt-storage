<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rastreador de Recibos</title>
    <meta name="description" content="Gestiona y rastrea tus recibos y deudas" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <div id="root"><p data-placeholder style="padding:2rem;font-family:sans-serif;color:#333">Cargando aplicaci&oacute;n&hellip;</p></div>
    <div id="diag" style="display:none"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Diagnostics — NEVER touches #root (React owns it).
      // Errors render in a separate #diag element below #root.
      var _diag = { errors: [], resources: [] };

      window.addEventListener('error', function(e) {
        if (e.target && e.target.tagName) {
          _diag.resources.push(e.target.tagName + ': ' + (e.target.src || e.target.href || '?'));
        }
      }, true);

      window.addEventListener('error', function(e) {
        _diag.errors.push('JS: ' + e.message + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'));
      });

      window.addEventListener('unhandledrejection', function(e) {
        _diag.errors.push('Promise: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
      });

      // Only show diagnostics if React never mounted (placeholder still present after 8s)
      setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || !root.querySelector('p[data-placeholder]')) return;
        _diag.errors.push('TIMEOUT: React did not mount within 8 seconds');
        var diag = document.getElementById('diag');
        if (!diag) return;
        var lines = ['UA: ' + navigator.userAgent, 'URL: ' + location.href, ''];
        if (_diag.errors.length) lines.push('ERRORS:', _diag.errors.join('\n'), '');
        if (_diag.resources.length) lines.push('FAILED RESOURCES:', _diag.resources.join('\n'), '');
        diag.style.display = 'block';
        diag.innerHTML = '<pre style="padding:1rem;color:red;font-size:11px;white-space:pre-wrap;word-break:break-all">' + lines.join('\n') + '</pre>';
      }, 8000);

      // Service worker cleanup
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) { reg.unregister(); });
        });
        if (typeof caches !== 'undefined') {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
        }
      }
    </script>
  </body>
</html>
