<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rastreador de Recibos</title>
    <meta name="description" content="Gestiona y rastrea tus recibos y deudas" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="root"><p style="padding:2rem;font-family:sans-serif;color:#333">Cargando aplicación…</p></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Diagnostic: show errors visibly on screen
      window.addEventListener('error', function(e) {
        document.getElementById('root').innerHTML =
          '<pre style="padding:1rem;color:red;font-size:12px;white-space:pre-wrap">' +
          'JS Error: ' + e.message + '\nFile: ' + e.filename + '\nLine: ' + e.lineno +
          '</pre>';
      });
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
