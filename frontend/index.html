<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rastreador de Recibos</title>
    <meta name="description" content="Gestiona y rastrea tus recibos y deudas" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <div id="root"><p data-placeholder style="padding:2rem;font-family:sans-serif;color:#333">Cargando aplicaci&oacute;n&hellip;</p></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service worker cleanup — unregister all SWs and clear caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        if (typeof caches !== 'undefined') {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
        }
      }
    </script>
  </body>
</html>
