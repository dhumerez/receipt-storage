server {
    listen 4001;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # File upload limit — multer limit is 10 MB; 12 m gives multipart overhead room
    client_max_body_size 12m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Service worker — must never be long-cached
    location ~ ^/(sw|workbox-.*)\.js$ {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://receipts-api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy health check
    location /health {
        proxy_pass http://receipts-api:4000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy admin routes
    location /admin/ {
        proxy_pass http://receipts-api:4000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
