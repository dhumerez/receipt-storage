services:
  receipts-api:
    build: ./backend
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://receipts_user:${DB_PASSWORD}@receipts-db:5432/receipts
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /var/receipts/uploads
      PORT: "4000"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    volumes:
      - /var/receipts/uploads:/var/receipts/uploads
    depends_on:
      receipts-db:
        condition: service_healthy
    networks:
      - receipts_internal

  receipts-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/receipts-app/}
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.receipts.rule=PathPrefix(`/receipts-app`)"
      - "traefik.http.routers.receipts.entrypoints=web"
      - "traefik.http.middlewares.receipts-strip.stripprefix.prefixes=/receipts-app"
      - "traefik.http.routers.receipts.middlewares=receipts-strip"
      - "traefik.http.services.receipts.loadbalancer.server.port=4001"
    depends_on:
      - receipts-api
    networks:
      - receipts_internal
      - web

  receipts-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: receipts
      POSTGRES_USER: receipts_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - receipts_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receipts_user -d receipts"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - receipts_internal

volumes:
  receipts_db_data:

networks:
  receipts_internal:
    driver: bridge
  web:
    external: true
