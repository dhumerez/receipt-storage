services:
  receipts-api:
    build: ./backend
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://receipts_user:${DB_PASSWORD}@receipts-db:5432/receipts
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /var/receipts/uploads
      PORT: "4000"
      CORS_ORIGIN: ${CORS_ORIGIN:-https://humerez.dev}
    volumes:
      - /var/receipts/uploads:/var/receipts/uploads
    depends_on:
      receipts-db:
        condition: service_healthy
    networks:
      - receipts_internal

  receipts-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_BASE_PATH: /
    restart: always
    labels:
      - "traefik.enable=true"
      # Main router — humerez.dev with HTTPS
      - "traefik.http.routers.receipts.rule=Host(`humerez.dev`)"
      - "traefik.http.routers.receipts.entrypoints=websecure"
      - "traefik.http.routers.receipts.tls=true"
      - "traefik.http.routers.receipts.tls.certresolver=letsencrypt"
      - "traefik.http.services.receipts.loadbalancer.server.port=4001"
      # WWW redirect → naked domain
      - "traefik.http.routers.receipts-www.rule=Host(`www.humerez.dev`)"
      - "traefik.http.routers.receipts-www.entrypoints=websecure"
      - "traefik.http.routers.receipts-www.tls=true"
      - "traefik.http.routers.receipts-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.receipts-www.middlewares=receipts-www-redirect"
      - "traefik.http.middlewares.receipts-www-redirect.redirectregex.regex=^https://www\\.humerez\\.dev/(.*)"
      - "traefik.http.middlewares.receipts-www-redirect.redirectregex.replacement=https://humerez.dev/$${1}"
      - "traefik.http.middlewares.receipts-www-redirect.redirectregex.permanent=true"
    depends_on:
      - receipts-api
    networks:
      - receipts_internal
      - web

  receipts-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: receipts
      POSTGRES_USER: receipts_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - receipts_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receipts_user -d receipts"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - receipts_internal

volumes:
  receipts_db_data:

networks:
  receipts_internal:
    driver: bridge
  web:
    external: true
